<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wi-Fi Web Configurator</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #f8fafc;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
    }
    .card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    h2 {
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
      color: #f8fafc;
    }
    p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .form-group {
      text-align: left;
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      color: #94a3b8;
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: #f8fafc;
      font-size: 0.95rem;
      box-sizing: border-box;
      outline: none;
    }
    input:focus {
      border-color: #6366f1;
    }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #4f46e5;
    }
    #status {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Wi-Fi Web Configurator</h2>
    <p>ระบุชื่อและรหัสผ่านเครือข่าย Wi-Fi ที่ต้องการให้อุปกรณ์เชื่อมต่อ</p>
    
    <form action="/save" method="POST" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label>SSID (ชื่อ Wi-Fi)</label>
        <input type="text" name="ssid" id="ssid" placeholder="ระบุ SSID ของคุณ" required>
      </div>
      <div class="form-group">
        <label>Password (รหัสผ่าน Wi-Fi)</label>
        <input type="password" name="password" id="password" placeholder="ระบุรหัสผ่านของคุณ" required>
      </div>
      <button type="submit" class="btn">บันทึกและเชื่อมต่อ</button>
    </form>
    
    <div id="status"></div>
  </div>

  <script>
    function handleSubmit(e) {
      document.getElementById("status").textContent = "กำลังส่งข้อมูลการตั้งค่าและรีบูตอุปกรณ์...";
    }
  </script>
</body>
</html>
