; =============================================================
;  Lab 3.1: Basic WiFi Connectivity (WiFi Scan & Station Mode)
;  PlatformIO Configuration
;  Compatible with: IPST-WiFi (ESP32) and AX-WiFi (ESP8266)
; =============================================================

[platformio]
default_envs = ipst_wifi

; ── ESP32 (IPST-WiFi / ESP32 DevKitC) ──────────────────────
[env:ipst_wifi]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
build_flags   = -DCORE_DEBUG_LEVEL=0

; ── ESP8266 (AX-WiFi / NodeMCU v2) ─────────────────────────
[env:ax_wifi]
platform  = espressif8266
board     = nodemcuv2
framework = arduino
monitor_speed = 115200
build_flags   = -DCORE_DEBUG_LEVEL=0
